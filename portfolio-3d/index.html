<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/src/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>portfolio-3d</title>
</head>

<body>
  <div id="loginUI">
    <div class="login-box">
      <input type="password" id="passwordInput" placeholder="Enter password">
      <button id="loginBtn">Unlock</button>
    </div>
  </div>
  
  <div id="crosshair">+</div>
  <script type="module" src="/src/main2.js"></script>
  <div id="tutorial">
    <h1>Welcome</h1>
    <p>Click and move the mouse to look around</p>
    <p>Use → and ← to walk</p>
    <button id="startBtn">Enter</button>
  </div>
  <div id="overlay"></div>
  </div>

  <div id="projectPanel">
    <div class="panel-content">

      <div class="image-container">
        <img id="projectImage" src="" />
      </div>

      <div class="text-container">
        <h2 id="projectTitle"></h2>
        <p id="projectDesc"></p>

        <div class="buttons">
          <button id="prevImage">←</button>
          <button id="nextImage">→</button>
          <button id="closeBtn">✕</button>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
